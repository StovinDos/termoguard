name: TermoGuard — Deploy Frontend

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Backend (Spring Boot + PostgreSQL) runs LOCALLY on your laptop for demos.
# This workflow only builds and deploys the React frontend to GitHub Pages.

jobs:
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    permissions:
      contents: write

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Use an absolute URL (with https://) so the browser never treats it
          # as a relative path.  When this was stored as a secret without the
          # scheme, GitHub Pages resolved it relative to the page origin and
          # produced URLs like https://stovindos.github.io/termoguard/<host>/…
          VITE_API_BASE_URL: https://termoguard-production.up.railway.app/api
          VITE_BASE_PATH: ${{ secrets.VITE_BASE_PATH }}
        run: npm run build

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
